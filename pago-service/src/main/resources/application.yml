spring:
  application:
    name: pago-service

  datasource:
    url: jdbc:mysql://localhost:3307/gym_cliente?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:bd/migration
    table: flyway_schema_history_pago

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

server:
  port: 8090

logging:
  level:
    com.prueba: DEBUG
    org.springframework.web: INFO

services:
  cliente:
    url: http://localhost:8081
  membresia:
    url: http://localhost:8085
  venta:
    url: http://localhost:8089

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:mysql://mysql:3306/gym_cliente?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: gym
    password: gym

services:
  cliente:
    url: http://cliente-service:8081
  membresia:
    url: http://membresia-service:8085
  venta:
    url: http://venta-service:8089
