spring.application.name=asistencia-service
server.port=8088


spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/gym_cliente?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true



spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect



spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

logging.level.com.prueba=DEBUG
logging.level.org.springframework.web=INFO

services.membresia.url=http://localhost:8085

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
